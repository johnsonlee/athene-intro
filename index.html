<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Athene · 让每个人都能看懂的选股逻辑</title>
    <meta name="description" content="基于三个朴素的投资原则，推导出一套完整的选股策略框架">
    <meta name="author" content="Johnson Lee">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Athene · 让每个人都能看懂的选股逻辑">
    <meta property="og:description" content="基于三个朴素的投资原则，推导出一套完整的选股策略框架">
    <link rel="stylesheet" href="https://slides.johnsonlee.io/slides.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@500;700&display=swap">
    <style>
      /* ── Finance Theme Overrides ── */
      :root {
        --slides-accent: #c9a96e;
        --slides-accent-rgb: 201, 169, 110;
        --finance-bg: #0d1117;
        --finance-bg-light: #161b22;
        --finance-text: #e6edf3;
        --finance-text-muted: #8b949e;
        --finance-border: rgba(201, 169, 110, 0.15);
        --finance-gold-glow: rgba(201, 169, 110, 0.08);
      }

      /* Background */
      .reveal {
        background: var(--finance-bg);
        background-image: radial-gradient(ellipse at 50% 30%, rgba(201, 169, 110, 0.03) 0%, transparent 70%);
      }

      /* Typography */
      .reveal {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        font-weight: 400;
        color: var(--finance-text);
        letter-spacing: 0.01em;
      }

      .reveal h1, .reveal h2 {
        font-family: 'Playfair Display', Georgia, 'Times New Roman', serif;
        font-weight: 700;
        letter-spacing: 0.02em;
        color: #fff;
      }

      .reveal h3 {
        font-family: 'Playfair Display', Georgia, 'Times New Roman', serif;
        font-weight: 500;
        color: var(--slides-accent);
      }

      /* Refined emphasis */
      .reveal strong {
        color: var(--slides-accent);
        font-weight: 600;
      }

      .reveal em {
        color: var(--finance-text-muted);
        font-style: italic;
      }

      /* Tables — data-forward finance style */
      .reveal table {
        border-collapse: separate;
        border-spacing: 0;
        border: 1px solid var(--finance-border);
        border-radius: 6px;
        overflow: hidden;
        width: 100%;
      }

      .reveal table thead tr {
        background: rgba(var(--slides-accent-rgb), 0.12);
      }

      .reveal table th {
        font-family: 'Inter', sans-serif;
        font-weight: 600;
        text-transform: uppercase;
        font-size: 0.55em;
        letter-spacing: 0.08em;
        color: var(--slides-accent);
        padding: 0.7em 1em;
        border-bottom: 2px solid var(--finance-border);
      }

      .reveal table td {
        padding: 0.6em 1em;
        border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        font-size: 0.6em;
      }

      .reveal table tbody tr:last-child td {
        border-bottom: none;
      }

      .reveal table tbody tr:hover {
        background: rgba(255, 255, 255, 0.02);
      }

      /* Blockquotes — key insight callouts */
      .reveal blockquote {
        background: var(--finance-bg-light);
        border-left: 3px solid var(--slides-accent);
        border-radius: 0 6px 6px 0;
        padding: 1em 1.5em;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.2), inset 0 0 30px var(--finance-gold-glow);
        font-style: normal;
      }

      .reveal blockquote p {
        color: var(--finance-text);
      }

      /* Lists */
      .reveal ul li, .reveal ol li {
        margin-bottom: 0.3em;
        line-height: 1.6;
      }

      .reveal ul li::marker {
        color: var(--slides-accent);
      }

      /* Links */
      .reveal a {
        color: var(--slides-accent);
        text-decoration: none;
        border-bottom: 1px solid rgba(var(--slides-accent-rgb), 0.3);
        transition: border-color 0.2s ease;
      }

      .reveal a:hover {
        border-bottom-color: var(--slides-accent);
      }

      /* Horizontal rules (slide separators within sections) */
      .reveal hr {
        border: none;
        height: 1px;
        background: linear-gradient(to right, transparent, var(--slides-accent), transparent);
        opacity: 0.3;
      }

      /* Slide number */
      .reveal .slide-number {
        font-family: 'Inter', sans-serif;
        font-size: 14px;
        color: var(--finance-text-muted);
        opacity: 0.6;
      }
    </style>
  </head>
  <body>
    <script src="https://slides.johnsonlee.io/slides.js"></script>
    <script>
      Slides.init({
        title: 'Athene · 让每个人都能看懂的选股逻辑',
        chapters: ['cover', 'problem', 'principles', 'strategy', 'examples', 'summary'],
        langs: { zh: '中文' }
      });
    </script>
  </body>
</html>
